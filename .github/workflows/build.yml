name: Build Flatpak

# Triggered manually — use this to validate the manifest and generated-sources
# before opening a Flathub PR or after making structural changes.
#
# For routine test builds against open Flathub PRs, comment "bot, build" on
# the PR instead; Flathub's own CI covers that use-case for free.
#
# Builds for x86_64 and aarch64 in parallel.  On success, both .flatpak
# bundles are uploaded as workflow artifacts for 3 days so you can install
# and test them locally:
#
#   flatpak install --user me.proton.Pass.flatpak
#   flatpak run me.proton.Pass

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── x86_64 ────────────────────────────────────────────────────────────────
  build-x86_64:
    name: Build (x86_64)
    runs-on: ubuntu-latest
    # Electron + Webpack + Rust compilation can exceed 2 h on a cold cache.
    timeout-minutes: 360
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: me.proton.Pass.flatpak
          manifest-path: me.proton.Pass.yml
          arch: x86_64
          cache-key: flatpak-builder-x86_64-${{ hashFiles('generated-sources.json', 'cargo-sources.json') }}
          upload-artifact: true

  # ── aarch64 ───────────────────────────────────────────────────────────────
  build-aarch64:
    name: Build (aarch64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    # The flathub-infra container only has a linux/amd64 image, so we can't
    # use it on a native arm64 runner without pulling it under emulation and
    # producing the wrong arch.  Install flatpak manually instead.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install flatpak tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y flatpak flatpak-builder xvfb
          sudo flatpak remote-add --system --if-not-exists flathub \
            https://flathub.org/repo/flathub.flatpakrepo
          # Grant non-root polkit access to flatpak operations in CI.
          sudo tee /etc/polkit-1/rules.d/10-flatpak-ci.rules > /dev/null << 'POLKIT'
          polkit.addRule(function(action, subject) {
              if (action.id.indexOf("org.freedesktop.Flatpak") === 0) {
                  return polkit.Result.YES;
              }
          });
          POLKIT
          sudo systemctl restart polkit
          # Pre-install runtimes as root so the action's dep-install step is
          # a fast no-op rather than a multi-GB download.
          sudo flatpak install -y --noninteractive flathub \
            org.freedesktop.Platform/aarch64/25.08 \
            org.freedesktop.Sdk/aarch64/25.08 \
            org.freedesktop.Sdk.Extension.node22/aarch64/25.08 \
            org.freedesktop.Sdk.Extension.rust-stable/aarch64/25.08 \
            org.electronjs.Electron2.BaseApp/aarch64/25.08

      - name: Shim xvfb-run for arm64
        run: |
          # Xvfb is unreliable on GitHub-hosted arm64 runners.  The
          # flatpak-builder action unconditionally wraps its build command with
          # xvfb-run, but the Pass build has no GUI requirement.  Replace
          # xvfb-run with a pass-through shim that strips its own flags and
          # exec's whatever command follows.
          sudo tee /usr/local/bin/xvfb-run > /dev/null << 'EOF'
          #!/bin/sh
          while [ $# -gt 0 ]; do
            case "$1" in
              -a|--auto-servernum) shift ;;
              -e|--error-file|-n|--server-num|-p|--server-args|-w|--wait) shift 2 ;;
              --) shift; break ;;
              -*) shift ;;
              *) break ;;
            esac
          done
          exec "$@"
          EOF
          sudo chmod +x /usr/local/bin/xvfb-run

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: me.proton.Pass-aarch64.flatpak
          manifest-path: me.proton.Pass.yml
          arch: aarch64
          cache-key: flatpak-builder-aarch64-${{ hashFiles('generated-sources.json', 'cargo-sources.json') }}
          upload-artifact: true
