app-id: me.proton.Pass
runtime: org.freedesktop.Platform
runtime-version: &runtime-version "25.08"
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: *runtime-version
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
  - org.freedesktop.Sdk.Extension.rust-stable
command: start-proton-pass
finish-args:
  - --share=ipc
  - --share=network
  - --socket=wayland
  - --socket=fallback-x11
  - --device=all
  # DBus-based libsecret
  - --talk-name=org.freedesktop.secrets
  # Tray icon
  - --talk-name=org.kde.StatusNotifierWatcher
  - --env=XCURSOR_PATH=~/.icons:/app/share/icons:/icons:/run/host/user-share/icons:/run/host/share/icons
modules:
  - name: dbus-run-session
    buildsystem: cmake-ninja
    cleanup: ["*"]
    sources:
      - type: archive
        url: https://gitlab.freedesktop.org/dbus/dbus/-/archive/dbus-1.16.2/dbus-dbus-1.16.2.tar.gz
        sha256: d77cc71acd93e85f2bd2a6fe3a40e5bd023519e3e9fa9b5361e7109f42b74060
        x-checker-data:
          type: anitya
          project-id: 5356
          url-template: https://gitlab.freedesktop.org/dbus/dbus/-/archive/dbus-$version/dbus-dbus-$version.tar.gz
  # fix auto logout
  # https://github.com/flathub/org.signal.Signal/pull/756/commits/2caf105b18f906e7707f67b3cf7384a21f461564
  - name: libsecret
    buildsystem: meson
    config-opts:
      - -Dmanpage=false
      - -Dcrypto=disabled
      - -Dvapi=false
      - -Dgtk_doc=false
      - -Dintrospection=false
      - -Dbash_completion=disabled
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
      - /share/man
    sources:
      - type: archive
        url: https://download.gnome.org/sources/libsecret/0.21/libsecret-0.21.7.tar.xz
        sha256: 6b452e4750590a2b5617adc40026f28d2f4903de15f1250e1d1c40bfd68ed55e
        x-checker-data:
          type: gnome
          name: libsecret
          stable-only: true
  - name: proton-pass
    buildsystem: simple
    # -----------------------------------------------------------------------
    # MAINTENANCE — two generated files must be re-committed whenever the
    # upstream source tag is bumped:
    #
    # 1. generated-sources.json  (JS/Node packages + Electron binary)
    #    Re-run when yarn.lock changes:
    #      flatpak-node-generator --electron-node-headers \
    #        yarn WebClients/yarn.lock \
    #        -o generated-sources.json
    #    Then strip Playwright browser binaries (not needed at build time):
    #      python3 -c "
    #        import json, sys
    #        data = json.load(open('generated-sources.json'))
    #        data = [e for e in data if not (
    #          e.get('type') == 'archive' and 'cdn.playwright.dev' in e.get('url','')
    #          or e.get('type') == 'inline' and 'ms-playwright' in e.get('dest',''))]
    #        json.dump(data, sys.stdout, indent=4); print()
    #      " > generated-sources.json.tmp && mv generated-sources.json.tmp generated-sources.json
    #
    # 2. cargo-sources.json  (Rust crates for the native NAPI addon and host)
    #    Re-run when applications/pass-desktop/native/Cargo.lock changes:
    #      python3 flatpak-cargo-generator.py \
    #        WebClients/applications/pass-desktop/native/Cargo.lock \
    #        -o cargo-sources.json
    #    (flatpak-cargo-generator.py is in flatpak-builder-tools/cargo/)
    # -----------------------------------------------------------------------
    build-options:
      append-path: /usr/lib/sdk/node22/bin:/usr/lib/sdk/rust-stable/bin
      env:
        # Give build tools a writable home inside the build tree
        HOME: /run/build/proton-pass
        # Rust toolchain provided by the SDK extension
        RUSTUP_HOME: /usr/lib/sdk/rust-stable
        CARGO_HOME: /run/build/proton-pass/cargo
        CARGO_NET_OFFLINE: "true"
        # Points @electron/packager directly at the pre-fetched Electron zip
        # directory via electronZipDir, bypassing @electron/get and its cache
        # entirely — no XDG_CACHE_HOME or env-paths involved.
        FLATPAK_ELECTRON_ZIP_DIR: /run/build/proton-pass/flatpak-node/cache/electron
        # Disable all Yarn network access — packages come from the pre-fetched
        # offline cache populated by generated-sources.json
        YARN_ENABLE_NETWORK: "0"
        YARN_ENABLE_TELEMETRY: "0"
        YARN_ENABLE_INLINE_BUILDS: "1"
        # Use only the project-local cache (not a shared global cache), and
        # point the global folder at the pre-fetched tarballs placed by the
        # generator in flatpak-node/yarn-berry/
        YARN_ENABLE_GLOBAL_CACHE: "0"
        YARN_GLOBAL_FOLDER: /run/build/proton-pass/flatpak-node/yarn-berry
        # XDG_CACHE_HOME covers @electron/get's Electron binary lookup
        # (checks $XDG_CACHE_HOME/electron/) as well as other tool caches
        XDG_CACHE_HOME: /run/build/proton-pass/flatpak-node/cache
        # Direct node-gyp / napi-rs to the SDK's Node.js headers
        npm_config_nodedir: /usr/lib/sdk/node22
        # Production build — disables dev-only webpack paths
        NODE_ENV: production
    build-commands:
      # ---- Restrict workspaces to pass-desktop only ---------------------
      # The monorepo contains many applications (meet, drive, lumo, mail,
      # calendar, wallet, …) that depend on packages from Proton's internal
      # npm registries (nexus.protontech.ch, gitlab.protontech.ch).  Those
      # registries are unreachable from the Flatpak sandbox.
      #
      # pass-desktop only needs two application workspaces:
      #   applications/pass-desktop  — the Electron app itself
      #   applications/pass          — the web-app renderer (imported by webpack)
      #
      # We replace the catch-all applications/* glob with explicit entries
      # for those two, and drop all test workspaces too.  Shared packages/*,
      # utilities/*, and vendor/*/* are left untouched — they are public.
      - |
        node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.workspaces = pkg.workspaces
            .filter(w => w !== 'applications/*' && !w.startsWith('tests'))
            .filter(w => !w.startsWith('applications/') ||
                         w === 'applications/pass-desktop/native' ||
                         w === 'applications/pass' ||
                         w === 'applications/pass-desktop')
            .concat(['applications/pass', 'applications/pass-desktop']);
          pkg.workspaces = [...new Set(pkg.workspaces)];
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
        "

      # Strip @rowsncolumns/* workspace: dependencies from docs-editor.
      # These are private/external packages (not in the monorepo) referenced
      # with workspace:^ — Yarn Berry fails with "Workspace not found" when it
      # encounters them, even though docs-editor is not an active workspace.
      # Fix suggested by D-Bao (Proton) in flathub/me.proton.Pass#99.
      - |
        node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('applications/docs-editor/package.json', 'utf8'));
          pkg.dependencies = Object.fromEntries(
            Object.entries(pkg.dependencies || {}).filter(([k]) => !k.startsWith('@rowsncolumns/')));
          fs.writeFileSync('applications/docs-editor/package.json', JSON.stringify(pkg, null, 2) + '\n');
        "

      # ---- JavaScript / TypeScript dependencies --------------------------
      # Set up the SDK Node.js headers for node-gyp / napi-rs (symlinks the
      # SDK include/ dir into the node-gyp cache expected by native builds).
      - bash flatpak-node/setup_sdk_node_headers.sh

      # Import the flatpak-yarn plugin generated by flatpak-node-generator.
      # This plugin adds the `yarn convertToZip` command used in the next step.
      - yarn plugin import $FLATPAK_BUILDER_BUILDDIR/flatpak-node/flatpak-yarn.js

      # Convert the pre-fetched tarballs in flatpak-node/yarn-berry/cache/locator/
      # to Yarn Berry's zip format in .yarn/cache/ so that `yarn install` can
      # find them without network access.
      - yarn convertToZip $(which yarn)

      # Install all packages from the converted offline cache.
      # --mode=skip-build suppresses postinstall scripts (native addons are
      # compiled separately in the Rust step below).
      # --immutable is intentionally omitted: pruning unneeded workspaces from
      # package.json causes Yarn to update the lockfile, which --immutable
      # would reject. YARN_ENABLE_NETWORK=0 ensures no network access occurs.
      - yarn install --mode=skip-build

      # ---- Rust native components ----------------------------------------
      # Point cargo at the pre-fetched vendor crates (cargo-sources.json places
      # them in cargo/vendor/ relative to the build root). We write the config
      # into the native workspace's own .cargo/ directory so that cargo picks it
      # up regardless of the working directory, and use an absolute path to
      # avoid any config-relative resolution ambiguity.
      - |
        mkdir -p applications/pass-desktop/native/.cargo
        cat > applications/pass-desktop/native/.cargo/config.toml << 'CARGOEOF'
        [source.crates-io]
        replace-with = "vendored-sources"

        [source.vendored-sources]
        directory = "/run/build/proton-pass/cargo/vendor"
        CARGOEOF

      # Compiles two crates inside applications/pass-desktop/native/:
      #   • napi/   → native.linux-x64-gnu.node  (NAPI clipboard/input addon)
      #   • host/   → proton_pass_nm_host         (browser native-messaging host)
      # Crate sources are pre-fetched by cargo-sources.json into $CARGO_HOME.
      - cd applications/pass-desktop && yarn run build:native

      # ---- Electron Forge package ----------------------------------------
      # Belt-and-suspenders: explicitly copy (not symlink) the pre-fetched
      # Electron zip into the @electron/get cache hash directory.
      # Cache key = sha256("https://github.com/electron/electron/releases/download/v39.5.2")
      - |
        EHASH=650aac941b88752ef9387b3b8b543359403599265dccc7b4daf0af12f06ee0d4
        ECACHE=flatpak-node/cache/electron
        mkdir -p "$ECACHE/$EHASH"
        case "$FLATPAK_ARCH" in
          aarch64) EZIP="electron-v39.5.2-linux-arm64.zip" ;;
          *)       EZIP="electron-v39.5.2-linux-x64.zip"   ;;
        esac
        cp "$ECACHE/$EZIP" "$ECACHE/$EHASH/$EZIP" || true
        cp "$ECACHE/SHASUMS256.txt-39.5.2" "$ECACHE/$EHASH/SHASUMS256.txt" || true

      # Runs the webpack main + renderer builds, then packages the result into
      # applications/pass-desktop/out/Proton Pass-linux-x64/
      # The Electron 39 binary is resolved from XDG_CACHE_HOME/electron/
      # (pre-fetched by generated-sources.json) rather than downloaded.
      - cd applications/pass-desktop && yarn exec -- electron-forge package

      # ---- Install -------------------------------------------------------
      - |
        case "$FLATPAK_ARCH" in
          aarch64) ELECTRON_ARCH="arm64" ;;
          arm)     ELECTRON_ARCH="armv7l" ;;
          *)       ELECTRON_ARCH="x64" ;;
        esac
        cp -r "applications/pass-desktop/out/Proton Pass-linux-${ELECTRON_ARCH}" "${FLATPAK_DEST}/proton-pass"

      # Split locale .pak files so the Flatpak runtime can install them as
      # separate per-language extensions (same technique as Firefox/Chromium).
      # https://searchfox.org/mozilla-central/rev/8a4f55bc09ffc5c25dcb4586c51ae4a9fee77b4c/taskcluster/docker/firefox-flatpak/runme.sh#131-133
      - |
        for lang in ${FLATPAK_DEST}/proton-pass/locales/*.pak
        do
          locale="$(basename -s .pak $lang)"
          install -Dm644 -t "${FLATPAK_DEST}/share/runtime/locale/${locale%%-*}/" "$lang"
          ln -sf "${FLATPAK_DEST}/share/runtime/locale/${locale%%-*}/$(basename $lang)" "${FLATPAK_DEST}/proton-pass/locales/$(basename $lang)"
        done

      # Icon is in the upstream repo; no separate download needed
      - install -Dm644 applications/pass-desktop/assets/logo.svg "${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg"

      # Desktop file — from this repo until upstreamed to ProtonMail/WebClients.
      # TODO: once https://github.com/ProtonMail/WebClients has a committed
      # applications/pass-desktop/assets/me.proton.Pass.desktop, replace the
      # local file source with a reference to that path in the git checkout.
      - install -Dm644 me.proton.Pass.desktop "${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop"

      # Patch the asar archive so the Electron window's WM class matches the
      # installed desktop file name (required for correct taskbar grouping in
      # GNOME Shell and other compositors).
      - patch-electron-desktop-filename "${FLATPAK_DEST}/proton-pass/resources/app.asar"

      - install -Dm644 me.proton.Pass.metainfo.xml "${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml"
      - install -Dm755 start-proton-pass.sh /app/bin/start-proton-pass

    sources:
      # Full monorepo checkout is required: pass-desktop's webpack renderer
      # imports from the sibling applications/pass web-app workspace, and
      # the root yarn.lock covers all workspaces.
      - type: git
        url: https://github.com/ProtonMail/WebClients.git
        tag: "proton-pass@1.36.0"
        commit: e138546d26d87748a9a6d73492fbe0780475a0dd
        x-checker-data:
          type: git
          tag-pattern: '^proton-pass@([\d]+\.[\d]+\.[\d]+)$'
          version-scheme: semantic

      # Pre-fetched npm/yarn packages + Electron binary.
      # Re-generate when yarn.lock changes (see MAINTENANCE comment above).
      - generated-sources.json

      # Pre-fetched Rust crates for applications/pass-desktop/native/.
      # Re-generate when native/Cargo.lock changes (see MAINTENANCE comment above).
      - cargo-sources.json

      # Removes private Proton npm registry config unreachable from the sandbox
      - type: patch
        path: remove-private-registries.patch

      # Removes rustup target add calls and restricts Linux to the native arch
      # gnu target only (no musl needed inside a Flatpak glibc runtime)
      - type: patch
        path: fix-native-build.patch

      # Adds packagerConfig.electronZipDir from FLATPAK_ELECTRON_ZIP_DIR so
      # @electron/packager resolves the pre-fetched Electron zip directly from
      # the flatpak-node cache directory without any network fetch.
      - type: patch
        path: fix-forge-electron-cache.patch

      - type: file
        path: me.proton.Pass.desktop

      - type: file
        path: me.proton.Pass.metainfo.xml

      - type: script
        dest-filename: start-proton-pass.sh
        commands:
          - env TMPDIR="$XDG_RUNTIME_DIR/app/${FLATPAK_ID:-me.proton.Pass}" zypak-wrapper
            "/app/proton-pass/Proton Pass" "$@"
